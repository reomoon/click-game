<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>30초 클릭 스피드 테스트</title>
<link rel="stylesheet" href="cps.css">
</head>
<body>
  <div class="container">
    <div class="coin-banner">
      <span class="coin-icon">🪙</span>
      <span class="coin-label">코인</span>
      <span id="coinCount" class="coin-value">0</span>
    </div>

    <a href="index.html" class="back-link">&larr; 가위바위보로</a>
    <h1>⏱️ 30초 클릭 챌린지</h1>
    <p class="subtitle">30초 동안 버튼을 최대한 많이 눌러보세요! (가끔 버튼이 도망가요)</p>

    <div class="stats">
      <div class="stat-box">
        <div class="stat-label">남은 시간</div>
        <div id="timeLeft" class="stat-value">30.0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">클릭 수</div>
        <div id="clickCount" class="stat-value">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">최고 기록</div>
        <div id="bestScore" class="stat-value">0</div>
      </div>
    </div>

    <div id="arena" class="arena">
      <button id="clickBtn" class="click-btn">시작하려면 누르세요!</button>
      <button id="gateBtn" class="gate-btn" type="button">100개<br>넘어가기<br><span class="gate-cost">100코인</span></button>
    </div>

    <div id="resultMessage" class="result-message"></div>
  </div>

  <div id="fireworks" class="fireworks-layer"></div>

<script src="cps.js"></script>
</body>
</html>
